# Requires mock auth + name-dob already completed
# ─────────────────────────────────────────────────────────────────────────────

- launchApp:
    arguments:
      MOCK_AUTH: "true"
      MOCK_SCREEN: "connect-bank"  # deeplinks directly to /(onboarding)/connect-bank

# SCR-004 Connect Bank
- assertVisible: "Connect your finances"
- assertVisible: "Skip for now"

# Trust badges visible
- assertVisible: "Bank-grade security"

# Skip → lands on dashboard
- tapOn: "Skip for now"

# SCR-005 Dashboard First Landing
- assertVisible: "Good morning"
