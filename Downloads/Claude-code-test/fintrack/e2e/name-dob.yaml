appId: com.fintrack.app
---
# ─────────────────────────────────────────────────────────────────────────────
# Test: Name + DOB onboarding screen (SCR-003)
# Requires mock auth state — session cookie injected by Maestro env
# ─────────────────────────────────────────────────────────────────────────────

- launchApp:
    arguments:
      MOCK_AUTH: "true"           # bypasses OAuth; sets a valid stub JWT
      MOCK_SCREEN: "name-dob"    # deeplinks directly to /(onboarding)/name-dob

# SCR-003 Name + DOB screen
- assertVisible: "Hi! What should we call you?"

# Enter first name
- tapOn:
    id: "first-name-input"

- inputText:
    id: "first-name-input"
    text: "Mukund"

# Continue button enabled
- assertVisible: "Continue"

# DOB section is visible
- assertVisible: "Date of Birth"

# Default DOB picker is pre-set to 26 years ago — just tap Continue
- tapOn: "Continue"

# Should advance to SCR-004 Connect Bank
- assertVisible: "Connect your finances"
