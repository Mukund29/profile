appId: com.fintrack.app
---
# ─────────────────────────────────────────────────────────────────────────────
# Test: Full onboarding welcome screen (Google OAuth path is mocked)
# SCR-001 Welcome → SCR-002 OTP
# ─────────────────────────────────────────────────────────────────────────────

- launchApp

# Welcome screen assertions
- assertVisible: "FinTrack"
- assertVisible: "Your money, tracked"
- assertVisible: "Continue with Google"
- assertVisible: "Continue with Apple"
- assertVisible: "Use phone or email"

# ── OTP / Magic Link path ────────────────────────────────────────────────────
- tapOn: "Use phone or email"

# SCR-002 OTP screen
- assertVisible: "Send Code"

- tapOn:
    id: "phone-email-input"

- inputText:
    id: "phone-email-input"
    text: "+919876543210"

- tapOn: "Send Code"

# OTP verification screen
- assertVisible: "Enter Verification Code"
- assertVisible: "9876543210"
